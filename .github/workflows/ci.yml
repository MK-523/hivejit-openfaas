name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate source files
        run: python scripts/check_repository.py --root .
      - name: Smoke-test V8 artifact reuse
        run: node prototypes/node-v8-artifact-cache/bench.js --runs 2
